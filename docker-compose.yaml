services:
  api:
    build:
      context: .
      dockerfile: container/python/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret-change-in-production}
      - DATABASE_URL=${DATABASE_URL:-postgresql://vbwd:vbwd@postgres:5432/vbwd}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@example.com}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-VBWD}
      # Enable mock GitHub client for local dev/test — never set this in production
      - GHRM_USE_MOCK_GITHUB=${GHRM_USE_MOCK_GITHUB:-true}
      # Server-side plugin management — the backend owns the authoritative
      # manifest for every VBWD app (its own plugins, fe-admin, fe-user).
      # Paths below live inside the container under /app/var, which is
      # bind-mounted from ${VBWD_VAR_DIR} on the host — the same directory
      # is mounted into fe-admin and fe-user so all three containers read
      # the same files. No plugin state is kept in container images or in
      # browser localStorage.
      - VBWD_VAR_DIR=/app/var
      - VBWD_BACKEND_PLUGINS_JSON=/app/var/plugins/backend-plugins.json
      - VBWD_BACKEND_PLUGINS_CONFIG_JSON=/app/var/plugins/backend-plugins-config.json
      - VBWD_FE_ADMIN_PLUGINS_JSON=/app/var/plugins/fe-admin-plugins.json
      - VBWD_FE_ADMIN_PLUGINS_CONFIG_JSON=/app/var/plugins/fe-admin-plugins-config.json
      - VBWD_FE_USER_PLUGINS_JSON=/app/var/plugins/fe-user-plugins.json
      - VBWD_FE_USER_PLUGINS_CONFIG_JSON=/app/var/plugins/fe-user-plugins-config.json
    volumes:
      - .:/app
      # Shared plugin state directory (default: ../var relative to
      # vbwd-backend/). Override by exporting VBWD_VAR_DIR before running
      # docker compose up. Must match whatever fe-admin / fe-user mount.
      - ${VBWD_VAR_DIR:-../var}:/app/var
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    command: postgres -c max_connections=200
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vbwd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vbwd}
      POSTGRES_DB: ${POSTGRES_DB:-vbwd}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vbwd} -d ${POSTGRES_DB:-vbwd}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    ports:
      - "8088:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

  test:
    build:
      context: .
      dockerfile: container/python/Dockerfile.test
    environment:
      PYTHONPATH: /app
      FLASK_ENV: testing
      DATABASE_URL: "postgresql://vbwd:vbwd@postgres:5432/vbwd"
      REDIS_URL: "redis://redis:6379/1"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - test

  # Integration tests with real PostgreSQL and HTTP requests
  test-integration:
    build:
      context: .
      dockerfile: container/python/Dockerfile.test
    environment:
      PYTHONPATH: /app
      FLASK_ENV: testing
      # Use PostgreSQL for integration tests
      DATABASE_URL: "postgresql://vbwd:vbwd@postgres:5432/vbwd"
      REDIS_URL: "redis://redis:6379/1"
      # Test data configuration
      TEST_DATA_SEED: "${TEST_DATA_SEED:-true}"
      TEST_DATA_CLEANUP: "${TEST_DATA_CLEANUP:-false}"
      TEST_USER_EMAIL: "${TEST_USER_EMAIL:-test@example.com}"
      TEST_USER_PASSWORD: "${TEST_USER_PASSWORD:-TestPass123@}"
      TEST_ADMIN_EMAIL: "${TEST_ADMIN_EMAIL:-admin@example.com}"
      TEST_ADMIN_PASSWORD: "${TEST_ADMIN_PASSWORD:-AdminPass123@}"
      # API URL for HTTP integration tests
      API_BASE_URL: "http://api:5000/api/v1"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    profiles:
      - test-integration

volumes:
  postgres_data:
